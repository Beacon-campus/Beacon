<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Solid High-Contrast Background -->
  <circle cx="50" cy="50" r="48" fill="#FBBF24" />
  
  <!-- Massive Golden Glow -->
  <circle cx="50" cy="50" r="40" fill="#FFFFFF" opacity="0.3" />
  
  <!-- Thick, Bold Lighthouse Silhouette (Slate-900) -->
  <g fill="#0F172A">
    <!-- Base / Tower -->
    <path d="M 35 85 L 65 85 L 58 40 L 42 40 Z" />
    <!-- Gallery -->
    <rect x="38" y="38" width="24" height="6" rx="2" />
    <!-- Light Room -->
    <rect x="44" y="28" width="12" height="10" />
    <!-- Cap -->
    <path d="M 38 28 C 38 18 62 18 62 28 Z" />
    <circle cx="50" cy="18" r="4" />
    
    <!-- Wave / Ground (Solid base for the tower) -->
    <path d="M 20 80 Q 50 95 80 80 L 80 90 L 20 90 Z" opacity="0.8" />
  </g>
  
  <!-- Intense Central Light -->
  <circle cx="50" cy="33" r="7" fill="#FFFFFF" />
  
  <!-- Large Abstract Beams (Inside the circle for cleaner look) -->
  <path d="M 44 33 L 10 15 L 10 51 Z" fill="#FFFFFF" opacity="0.5" />
  <path d="M 56 33 L 90 15 L 90 51 Z" fill="#FFFFFF" opacity="0.5" />
</svg>
